<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LiveCultr Email Signature</title>
  <style>
    body {
      margin: 0;
      padding: 40px;
      background: #1a1a1a;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      box-sizing: border-box;
    }
    .preview-label {
      color: #555;
      font-size: 11px;
      text-align: center;
      margin-bottom: 16px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <div>
    <p class="preview-label">Email Signature Preview</p>

    <!-- ============================================================
         COPY EVERYTHING BELOW THIS LINE INTO YOUR EMAIL CLIENT
         ============================================================ -->
    <table
      cellpadding="0"
      cellspacing="0"
      border="0"
      style="
        background-color: #0a0a0a;
        border-radius: 12px;
        padding: 20px 24px;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
        max-width: 480px;
        width: 100%;
      "
    >
      <tr>
        <td style="vertical-align: top; padding-right: 16px; width: 68px;">
          <!-- Profile photo -->
          <img
            src="https://media.licdn.com/dms/image/v2/D5603AQFXAIaIEtdjrQ/profile-displayphoto-shrink_400_400/profile-displayphoto-shrink_400_400/0/1690386845322?e=1773878400&v=beta&t=V56P18OxXMSBj26DWyVhFql6E9lzqQwc1yg-GqGdtOQ"
            alt="Profile photo"
            width="60"
            height="60"
            style="
              border-radius: 50%;
              display: block;
              object-fit: cover;
              border: 2px solid #2a2a2a;
            "
          />
        </td>
        <td style="vertical-align: top;">
          <!-- Name -->
          <p style="
            margin: 0 0 2px 0;
            font-size: 15px;
            font-weight: 600;
            color: #ffffff;
            line-height: 1.3;
          ">Eric S.</p>
          <!-- Title -->
          <p style="
            margin: 0 0 10px 0;
            font-size: 12px;
            color: #888888;
            line-height: 1.4;
          ">Team Member &nbsp;·&nbsp; LiveCultr</p>

          <!-- Divider -->
          <table cellpadding="0" cellspacing="0" border="0" style="width: 100%; margin-bottom: 10px;">
            <tr>
              <td style="border-top: 1px solid #222222; font-size: 0; line-height: 0;">&nbsp;</td>
            </tr>
          </table>

          <!-- Contact info -->
          <table cellpadding="0" cellspacing="0" border="0">
            <tr>
              <td style="
                font-size: 12px;
                color: #666666;
                padding-bottom: 3px;
                padding-right: 6px;
              ">&#9993;</td>
              <td style="font-size: 12px; padding-bottom: 3px;">
                <a href="mailto:eric@livecultr.co" style="color: #aaaaaa; text-decoration: none;">eric@livecultr.co</a>
              </td>
            </tr>
            <tr>
              <td style="
                font-size: 12px;
                color: #666666;
                padding-right: 6px;
              ">&#127760;</td>
              <td style="font-size: 12px;">
                <a href="https://livecultr.co" style="color: #aaaaaa; text-decoration: none;">livecultr.co</a>
              </td>
            </tr>
          </table>
        </td>
      </tr>

      <!-- Bottom logo strip -->
      <tr>
        <td colspan="2" style="padding-top: 16px;">
          <table cellpadding="0" cellspacing="0" border="0" style="width: 100%;">
            <tr>
              <td style="border-top: 1px solid #1e1e1e; font-size: 0; line-height: 0; padding-bottom: 14px;">&nbsp;</td>
            </tr>
          </table>
          <table cellpadding="0" cellspacing="0" border="0" style="width: 100%;">
            <tr>
              <td style="vertical-align: middle;">
                <!-- SVG Logo inlined -->
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 70 86" width="22" height="27" aria-label="LiveCultr Logo" style="display: block; color: #ffffff;">

                  <defs>
                    <linearGradient id="sig-grad" x1="70.802" x2="40.192" y1=".7" y2="21.051" gradientUnits="userSpaceOnUse">
                      <stop stop-color="#F27866"/>
                      <stop offset=".197" stop-color="#F8A489"/>
                      <stop offset="1" stop-color="#FED0AB"/>
                    </linearGradient>
                  </defs>
                </svg>
              </td>
              <td style="vertical-align: middle; text-align: right;">
                <span style="font-size: 10px; color: #444444; letter-spacing: 0.06em; text-transform: uppercase;">LiveCultr &copy; 2026</span>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
    <!-- ============================================================
         END OF EMAIL SIGNATURE
         ============================================================ -->
  </div>
</body>
</html>
